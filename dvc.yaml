stages:
  run-sim:
    cmd: calkit xenv -n foam --no-check -- python run.py --overwrite --turbulence-model
      ${item.turbulence_model}
    deps:
      - run.py
      - system
      - constant/transportProperties
      - .calkit/env-locks/foam
    outs:
      - cases/${item.turbulence_model}/postProcessing
    matrix:
      turbulence_model:
        - laminar
        - k-epsilon
        - k-omega
    desc: Automatically generated from the 'run-sim' stage in calkit.yaml.
      Changes made here will be overwritten.
  plot-mean-velocity-profiles:
    cmd: calkit xenv -n foam --no-check -- python scripts/plot-mean-velocity-profiles.py
    deps:
      - scripts/plot-mean-velocity-profiles.py
      - data/jhtdb-profiles.h5
      - .calkit/env-locks/foam
      - cases/laminar/postProcessing
      - cases/k-epsilon/postProcessing
      - cases/k-omega/postProcessing
    outs:
      - figures/mean-velocity-profiles.png
    desc: Automatically generated from the 'plot-mean-velocity-profiles'
      stage in calkit.yaml. Changes made here will be overwritten.
  build-paper:
    cmd: calkit latex build -e latex --no-check paper/paper.tex
    deps:
      - paper/paper.tex
      - .calkit/env-locks/latex
      - figures/mean-velocity-profiles.png
    outs:
      - paper/paper.pdf
    desc: Automatically generated from the 'build-paper' stage in calkit.yaml.
      Changes made here will be overwritten.
