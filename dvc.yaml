stages:
  _check-env-foam:
    cmd: calkit check environment --name foam
    deps:
      - Dockerfile
    outs:
      - .calkit/env-locks/foam.json:
          cache: false
          persist: true
    always_changed: true
    desc: Automatically generated by Calkit. Changes made here will be
      overwritten.
  _check-env-latex:
    cmd: calkit check environment --name latex
    deps: []
    outs:
      - .calkit/env-locks/latex.json:
          cache: false
          persist: true
    always_changed: true
    desc: Automatically generated by Calkit. Changes made here will be
      overwritten.
  run-sim:
    cmd: calkit xenv -n foam --no-check -- python run.py --overwrite 
      --turbulence-model ${item.turbulence_model}
    deps:
      - run.py
      - system
      - constant/transportProperties
      - .calkit/env-locks/foam.json
    outs:
      - cases/${item.turbulence_model}/postProcessing
    matrix:
      turbulence_model:
        - laminar
        - k-epsilon
        - k-omega
    desc: Automatically generated from the 'run-sim' stage in 
      calkit.yaml. Changes made here will be overwritten.
  plot-mean-velocity-profiles:
    cmd: calkit xenv -n foam --no-check -- python 
      scripts/plot-mean-velocity-profiles.py
    deps:
      - scripts/plot-mean-velocity-profiles.py
      - data/jhtdb-profiles.h5
      - .calkit/env-locks/foam.json
      - cases/laminar/postProcessing
      - cases/k-epsilon/postProcessing
      - cases/k-omega/postProcessing
    outs:
      - figures/mean-velocity-profiles.png
    desc: Automatically generated from the 
      'plot-mean-velocity-profiles' stage in calkit.yaml. Changes made
      here will be overwritten.
  build-paper:
    cmd: calkit xenv -n latex --no-check -- latexmk -cd 
      -interaction=nonstopmode -silent -synctex=1 -pdf paper/paper.tex
    deps:
      - paper/paper.tex
      - .calkit/env-locks/latex.json
      - figures/mean-velocity-profiles.png
    outs:
      - paper/paper.pdf
    desc: Automatically generated from the 'build-paper' stage in 
      calkit.yaml. Changes made here will be overwritten.
